{% extends 'base.html' %}

{% block title %}Управление типами{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-tags"></i> Типы</h1>
    <a href="{% url 'directories:type_create' %}" class="btn btn-success">
        <i class="bi bi-plus-circle"></i> Добавить типы
    </a>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for type in types %}
            <tr>
                <td>{{ type.id }}</td>
                <td>{{ type.name }}</td>
                <td>
                    <a href="{% url 'directories:type_update' type.pk %}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'directories:type_delete' type.pk %}" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-center text-muted">Нет типов</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
